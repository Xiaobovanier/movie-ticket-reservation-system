spring.application.name=movie-ticket-system

server.port=7070

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/movie_ticket_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=ThisIsASecretKeyForMovieTicketSystemJwtToken2026SecureKey
jwt.expiration=86400000